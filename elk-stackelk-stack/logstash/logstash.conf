input {
  beats {
    port => 5044
  }
  tcp {
    port => 5000
    codec => json
  }
}

filter {
  # Проверяем, есть ли в сообщении JSON от dummy-app
  if [message] =~ /^{.*"service".*}$/ {
    json {
      source => "message"
      target => "parsed"
    }
    
    if [parsed] {
      mutate {
        add_field => {
          "service" => "%{[parsed][service]}"
          "level" => "%{[parsed][level]}"
          "random_value" => "%{[parsed][random_value]}"
          "original_message" => "%{[parsed][message]}"
        }
        replace => { "message" => "%{[parsed][message]}" }
        remove_field => ["parsed"]
      }
      
      # Конвертируем random_value в число
      mutate {
        convert => { "random_value" => "integer" }
      }
    }
  }
  
  # Добавляем тег для всех обработанных логов
  mutate {
    add_tag => ["processed_by_logstash"]
  }
}

output {
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "logstash-%{+YYYY.MM.dd}"
  }
  stdout { 
    codec => rubydebug 
  }
}
